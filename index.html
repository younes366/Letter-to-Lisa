<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Letter for Lisa </title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f1d4d4;
    }

    .container {
        margin-top: 80px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 30px;
        color: #d32f2f;
    }

    .buttons {
        margin-bottom: 20px;
    }

    button {
        padding: 12px 25px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .yes-button {
        background-color: #4CAF50;
        color: white;
    }

    .yes-button:hover {
        background-color: #45a049;
    }

    .no-button {
        background-color: #f44336;
        color: white;
        position: relative;
    }

    /* 🥐 DANSENDE CROISSANT */
    @keyframes dance {
        0% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-15px) rotate(-5deg); }
        50% { transform: translateY(0) rotate(5deg); }
        75% { transform: translateY(-10px) rotate(-3deg); }
        100% { transform: translateY(0) rotate(0deg); }
    }

    .gif_container img {
        width: 250px;
        display: block;
        margin: 20px auto;
        animation: dance 1.5s infinite;
    }

    #message {
        font-size: 18px;
        margin-top: 20px;
    }
</style>

</head>

<body>
    <div class="container">
        <h1>Es-tu la meilleure prof du monde ?</h1>

    <div class="buttons">
        <button class="yes-button" onclick="yesClick()">Oui</button>
        <button class="no-button" onmouseover="moveButton(this)">Non</button>
    </div>

    <p id="message"></p>

    <div class="gif_container">
        <img src="croissant clear.png" alt="croissant">
    </div>
</div>

<!-- 🎉 CONFETTI SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    function yesClick() {
        document.getElementById("message").innerHTML =
        "Tu rends les gens heureux avec ton beau comportement";

        const duration = 3 * 1000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 15,
                angle: 60,
                spread: 70,
                origin: { x: 0 }
            });

            confetti({
                particleCount: 15,
                angle: 120,
                spread: 70,
                origin: { x: 1 }
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        })();
    }

    function moveButton(button) {
        const x = Math.random() * (window.innerWidth - button.offsetWidth);
        const y = Math.random() * (window.innerHeight - button.offsetHeight);

        button.style.position = "absolute";
        button.style.left = x + "px";
        button.style.top = y + "px";
    }

    /* 👉 meteen verplaatsen bij laden */
    window.onload = function() {
        const button = document.querySelector(".no-button");
        moveButton(button);
    };
</script>

</body>
</html>
